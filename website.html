    <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nykaa Style Beauty Store</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#fff5f8;
}

/* Navbar */
.navbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 40px;
    background:#1e1d1d;
    color:white;
}

.logo{
    font-size:24px;
    font-weight:bold;
}

.nav-links a{
    margin:0 15px;
    text-decoration:none;
    color:white;
    font-weight:500;
}

/* Hero */
.hero{
    text-align:center;
    padding:60px 20px;
    background:linear-gradient(to right,#ff2d55,#ff7aa2);
    color:white;
}

.hero h1{
    font-size:40px;
}

/* Products */
.products{
    padding:40px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:25px;
}

.card{
    background:white;
    border-radius:10px;
    padding:15px;
    text-align:center;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.card img{
    width:100%;
    height:180px;
    object-fit:cover;
}

.price{
    color:#ff2d55;
    font-weight:bold;
}

button{
    background:#ff2d55;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#e6003d;
}

/* Cart */
.cart{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#ff2d55;
    color:white;
    padding:12px 18px;
    border-radius:30px;
    font-weight:bold;
}
</style>
</head>

<body>

<!-- Navbar -->
<div class="navbar">
<div class="logo">NYKAA</div>
<div class="nav-links">
<a href="#">Home</a>
<a href="#">Makeup</a>
<a href="#">Skincare</a>
<a href="#">Hair</a>
</div>
</div>

<!-- Hero -->
<div class="hero">
<h1>Beauty Begins Here</h1>
<p>Discover your favourite makeup & skincare</p>
</div>

<!-- Products -->
<div class="products">

<div class="card">
<img src="https://via.placeholder.com/200">
<h3>Lipstick</h3>
<p class="price">₹599</p>
<button onclick="addCart()">Add to Cart</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/200">
<h3>Foundation</h3>
<p class="price">₹899</p>
<button onclick="addCart()">Add to Cart</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/200">
<h3>Face Serum</h3>
<p class="price">₹1299</p>
<button onclick="addCart()">Add to Cart</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/200">
<h3>Mascara</h3>
<p class="price">₹499</p>
<button onclick="addCart()">Add to Cart</button>
</div>

</div>

<div class="cart">Cart: <span id="count">0</span></div>

<script>
let cart = 0;

function addCart(){
    cart++;
    document.getElementById("count").innerText = cart;
}
</script>


    
</body>
</html>
